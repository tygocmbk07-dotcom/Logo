<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TygozZz – AI Image Upscaler</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 30px 20px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      text-align: center;
    }
    .logo-img {
      width: 180px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px rgba(168,85,247,0.5));
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: white;
      color: #111;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-top: 20px;
    }
    .btn:hover { background: #f0f0f0; transform: translateY(-2px); }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }
    .upload-zone {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 40px 20px;
      margin: 20px 0;
      transition: all 0.2s;
      cursor: pointer;
    }
    .upload-zone.dragover {
      border-color: #a855f7;
      background: rgba(168,85,247,0.05);
    }
    .hidden { display: none !important; }
    .flex-col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }
    .results img {
      width: 100%;
      border-radius: 16px;
      max-height: 250px;
      object-fit: contain;
      background: rgba(0,0,0,0.3);
    }
    .error {
      color: #ff6b6b;
      background: rgba(255,0,0,0.1);
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 14px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      border-radius: 3px;
      transition: width 0.3s;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo-text {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    @media (max-width: 400px) {
      .glass { padding: 20px 15px; }
    }
  </style>
</head>
<body>
  <!-- AUTH SCREEN -->
  <div id="authScreen">
    <div class="glass">
      <img src="https://raw.githubusercontent.com/tygocmbk07-dotcom/Logo/main/InShot_20260630_023506063.png"
           alt="TygozZz Logo" class="logo-img"
           onerror="this.style.display='none'; document.getElementById('logoText').classList.remove('hidden');">
      <div id="logoText" class="logo-text hidden">TygozZz</div>
      <h2 style="font-weight:500; margin-bottom:10px;">AI Image Upscaler</h2>
      <p style="color:#aaa; font-size:14px;">Sign in to enhance your images</p>
      <button id="googleSignInBtn" class="btn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <div class="glass">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div style="text-align:left;">
          <div style="font-weight:700; font-size:20px;">TygozZz</div>
          <div style="font-size:12px; color:#aaa;" id="userName"></div>
        </div>
        <button id="signOutBtn" class="btn-outline">Sign Out</button>
      </div>

      <div id="uploadZone" class="upload-zone">
        <div style="font-size:40px;">📤</div>
        <p id="uploadText">Tap to upload an image</p>
        <p style="font-size:12px; color:#666; margin-top:5px;">JPG, PNG yoki WebP (max 10MB)</p>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>

      <!-- Progress bo‘limi -->
      <div id="progressContainer" class="hidden" style="margin:10px 0;">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill" style="width:0%;"></div>
        </div>
        <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
          <div class="spinner"></div>
          <span id="progressText">Upscaling...</span>
        </div>
      </div>

      <!-- Natijalar -->
      <div id="resultBox" class="hidden">
        <div class="results">
          <div>
            <p style="font-size:12px; color:#aaa; margin-bottom:5px;">Original</p>
            <img id="originalImg" alt="Original">
          </div>
          <div>
            <p style="font-size:12px; color:#a855f7; margin-bottom:5px;">Upscaled 4x</p>
            <img id="upscaledImg" alt="Upscaled">
          </div>
        </div>
        <button id="downloadBtn" class="btn-outline" style="margin-top:15px; width:100%;">⬇ Download upscaled image</button>
      </div>

      <div id="errorMsg" class="error hidden"></div>
    </div>
  </div>

  <script>
    // ========== KONFIGURATSIYA ==========
    const firebaseConfig = {
      apiKey: "AIzaSyCrAq_ASEVnaEfAeOdJ2xjP_ib0XXblWoQ",
      authDomain: "tygozzz-8f657.firebaseapp.com",
      projectId: "tygozzz-8f657",
      storageBucket: "tygozzz-8f657.firebasestorage.app",
      messagingSenderId: "717999040883",
      appId: "1:717999040883:web:eb0484c74f2b50f55afd06"
    };
    const HF_TOKEN = "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";
    const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

    // ========== FIREBASE INIT ==========
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ========== DOM ELEMENTLAR ==========
    const authScreen = document.getElementById('authScreen');
    const dashboard = document.getElementById('dashboard');
    const googleSignInBtn = document.getElementById('googleSignInBtn');
    const signOutBtn = document.getElementById('signOutBtn');
    const userNameSpan = document.getElementById('userName');
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const uploadText = document.getElementById('uploadText');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const resultBox = document.getElementById('resultBox');
    const originalImg = document.getElementById('originalImg');
    const upscaledImg = document.getElementById('upscaledImg');
    const downloadBtn = document.getElementById('downloadBtn');
    const errorMsg = document.getElementById('errorMsg');

    // ========== AUTH ==========
    googleSignInBtn.addEventListener('click', () => {
      auth.signInWithPopup(provider).catch(err => {
        showError('Kirishda xatolik: ' + err.message);
      });
    });

    signOutBtn.addEventListener('click', () => {
      auth.signOut();
    });

    auth.onAuthStateChanged(user => {
      if (user) {
        authScreen.classList.add('hidden');
        dashboard.classList.remove('hidden');
        userNameSpan.textContent = '👋 ' + (user.displayName || 'User');
      } else {
        authScreen.classList.remove('hidden');
        dashboard.classList.add('hidden');
      }
    });

    // ========== DRAG & DROP VA YUKLASH ==========
    uploadZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    // ========== ASOSIY MANTIQ ==========
    async function handleFile(file) {
      // Validatsiya
      if (!file.type.startsWith('image/')) {
        showError('Iltimos, faqat rasm faylini yuklang (JPEG, PNG, WebP).');
        return;
      }
      if (file.size > MAX_FILE_SIZE) {
        showError('Fayl hajmi 10MB dan oshmasligi kerak.');
        return;
      }

      // UI tozalash
      hideError();
      resultBox.classList.add('hidden');
      uploadText.textContent = file.name;

      // Original rasmni ko'rsatish
      const reader = new FileReader();
      reader.onload = (e) => {
        originalImg.src = e.target.result;
      };
      reader.readAsDataURL(file);

      // Progress ko'rsatish
      progressContainer.classList.remove('hidden');
      progressFill.style.width = '0%';
      progressText.textContent = 'Yuklanmoqda...';

      // Sun'iy progress (API progress bermaydi)
      let progress = 0;
      const progressInterval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 90) progress = 90;
        progressFill.style.width = progress + '%';
      }, 300);

      try {
        const response = await fetch('https://api-inference.huggingface.co/models/lllyasviel/Real-ESRGAN', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + HF_TOKEN
          },
          body: file
        });

        clearInterval(progressInterval);

        if (!response.ok) {
          if (response.status === 503) throw new Error('Model band, iltimos birozdan keyin urinib ko‘ring.');
          if (response.status === 401) throw new Error('API token noto‘g‘ri.');
          throw new Error('Server xatosi: ' + response.status);
        }

        // Yakuniy progress
        progressFill.style.width = '100%';
        progressText.textContent = 'Tayyor!';
        await new Promise(r => setTimeout(r, 500)); // qisqa ko‘rsatish

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        upscaledImg.src = url;
        resultBox.classList.remove('hidden');

        // Download tugmasi
        downloadBtn.onclick = () => {
          const a = document.createElement('a');
          a.href = url;
          a.download = 'upscaled_' + file.name;
          a.click();
        };

        uploadText.textContent = '✅ Kuchaytirildi! Yangi rasm yuklang.';
      } catch (err) {
        showError('Xatolik: ' + err.message);
        uploadText.textContent = 'Xatolik yuz berdi. Qayta urinib ko‘ring.';
      } finally {
        clearInterval(progressInterval);
        progressContainer.classList.add('hidden');
        progressFill.style.width = '0%';
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }
    function hideError() {
      errorMsg.classList.add('hidden');
    }
  </script>
</body>
</html>
