<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TygozZz – AI Upscaler</title>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'};</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; margin: 0; background: #050505; color: #fff; }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 28px;
    }
    .glass-hover:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(139, 92, 246, 0.4);
    }
    .upload-zone {
      border: 2px dashed rgba(255, 255, 255, 0.12);
      transition: all 0.2s;
      cursor: pointer;
      border-radius: 28px;
    }
    .upload-zone.dragover {
      border-color: #8b5cf6;
      background: rgba(139, 92, 246, 0.06);
    }
    .progress-bar {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      overflow: hidden;
      height: 6px;
    }
    .progress-fill {
      background: linear-gradient(90deg, #8b5cf6, #6366f1);
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }
    .scale-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #aaa;
      transition: all 0.2s;
    }
    .scale-btn.active {
      background: rgba(139, 92, 246, 0.15);
      border-color: #8b5cf6;
      color: #fff;
    }
    .result-img {
      background: rgba(0,0,0,0.4);
      border-radius: 18px;
      object-fit: contain;
    }
    input, select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      border-radius: 14px;
      padding: 12px;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #8b5cf6;
    }
    .modal-backdrop {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="bg-[#050505] text-white min-h-screen">

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass p-10 max-w-sm w-full text-center space-y-7">
      <img src="https://raw.githubusercontent.com/tygocmbk07-dotcom/Logo/main/InShot_20260630_023506063.png" alt="TygozZz Logo" class="w-52 mx-auto" onerror="this.style.display='none'; document.getElementById('logoFallback').classList.remove('hidden');">
      <div id="logoFallback" class="hidden text-6xl font-black bg-gradient-to-r from-violet-400 to-indigo-400 text-transparent bg-clip-text">TygozZz</div>
      <h2 class="text-2xl font-semibold" data-i18n="title">AI Image Upscaler</h2>
      <p class="text-gray-400 text-sm" data-i18n="subtitle">Sign in to upscale images to 8K</p>
      <button id="googleSignInBtn" class="w-full flex items-center justify-center gap-3 py-3.5 px-6 bg-white text-gray-900 font-semibold rounded-2xl hover:bg-gray-100 transition-all shadow-lg shadow-violet-500/10">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span data-i18n="signIn">Sign in with Google</span>
      </button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
    <!-- Header -->
    <div class="glass p-4 flex flex-wrap justify-between items-center gap-4 mb-8">
      <div class="flex items-center gap-3">
        <img id="userAvatar" class="w-10 h-10 rounded-full" alt="avatar">
        <div>
          <h1 class="font-bold text-xl">TygozZz</h1>
          <p class="text-xs text-gray-400" id="userName"></p>
        </div>
      </div>
      <div class="flex gap-2">
        <button id="profileBtn" class="px-4 py-2 text-sm bg-white/5 rounded-xl hover:bg-white/10 transition" data-i18n="profile">Profile</button>
        <button id="settingsBtn" class="px-4 py-2 text-sm bg-white/5 rounded-xl hover:bg-white/10 transition" data-i18n="settings">Settings</button>
        <button id="signOutBtn" class="px-4 py-2 text-sm bg-white/5 rounded-xl hover:bg-white/10 transition" data-i18n="signOut">Sign Out</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex flex-col items-center">
      <!-- Upload Zone -->
      <div id="uploadZone" class="glass upload-zone w-full max-w-3xl p-12 md:p-20 text-center">
        <div class="text-6xl mb-5">📤</div>
        <h3 class="text-2xl font-semibold mb-2" data-i18n="dropHere">Drop your image here</h3>
        <p class="text-gray-400 text-sm" data-i18n="browse">or tap to browse</p>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>

      <!-- Scale Selection -->
      <div class="flex justify-center gap-3 mt-8">
        <button class="scale-btn px-6 py-2.5 rounded-xl font-medium text-sm" data-scale="2">2x</button>
        <button class="scale-btn px-6 py-2.5 rounded-xl font-medium text-sm active" data-scale="4">4x</button>
        <button class="scale-btn px-6 py-2.5 rounded-xl font-medium text-sm" data-scale="8">8x</button>
      </div>

      <!-- Progress -->
      <div id="progressContainer" class="hidden w-full max-w-xl mt-8 glass p-5">
        <div class="flex justify-between text-sm mb-2">
          <span id="progressText" data-i18n="upscaling">Upscaling...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Results -->
      <div id="resultBox" class="hidden w-full max-w-4xl mt-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="glass p-5">
            <p class="text-sm text-gray-400 mb-3" data-i18n="original">Original</p>
            <img id="originalImg" class="result-img w-full h-72 object-contain" alt="original">
          </div>
          <div class="glass p-5 border border-violet-400/20">
            <p class="text-sm text-violet-400 mb-3" data-i18n="upscaled">Upscaled</p>
            <img id="upscaledImg" class="result-img w-full h-72 object-contain" alt="upscaled">
          </div>
        </div>
        <button id="downloadBtn" class="mt-6 w-full py-3.5 glass glass-hover font-semibold text-sm" data-i18n="download">⬇ Download upscaled image</button>
      </div>

      <!-- Error -->
      <div id="errorMsg" class="hidden mt-6 w-full max-w-xl glass p-4 text-red-400 border border-red-400/20 rounded-2xl"></div>
    </div>
  </div>

  <!-- PROFILE MODAL -->
  <div id="profileModal" class="hidden fixed inset-0 modal-backdrop flex items-center justify-center p-4 z-50">
    <div class="glass p-6 max-w-sm w-full space-y-5">
      <h2 class="text-xl font-semibold" data-i18n="profile">Profile</h2>
      <img id="profileAvatar" class="w-20 h-20 rounded-full mx-auto" alt="avatar">
      <input id="displayNameInput" class="w-full" placeholder="Display Name">
      <button id="saveProfileBtn" class="w-full py-3 bg-violet-600 rounded-2xl font-semibold" data-i18n="save">Save</button>
      <button id="closeProfileBtn" class="w-full py-3 glass-hover rounded-2xl" data-i18n="close">Close</button>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div id="settingsModal" class="hidden fixed inset-0 modal-backdrop flex items-center justify-center p-4 z-50">
    <div class="glass p-6 max-w-sm w-full space-y-5">
      <h2 class="text-xl font-semibold" data-i18n="settings">Settings</h2>
      <div>
        <label class="text-sm text-gray-400" data-i18n="language">Language</label>
        <select id="langSelect" class="w-full mt-1">
          <option value="uz">🇺🇿 O‘zbek</option>
          <option value="ru">🇷🇺 Русский</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
      <button id="closeSettingsBtn" class="w-full py-3 glass-hover rounded-2xl" data-i18n="close">Close</button>
    </div>
  </div>

  <script>
    // ========== KONFIGURATSIYA ==========
    const firebaseConfig = {
      apiKey: "AIzaSyCrAq_ASEVnaEfAeOdJ2xjP_ib0XXblWoQ",
      authDomain: "tygozzz-8f657.firebaseapp.com",
      projectId: "tygozzz-8f657",
      storageBucket: "tygozzz-8f657.firebasestorage.app",
      messagingSenderId: "717999040883",
      appId: "1:717999040883:web:eb0484c74f2b50f55afd06"
    };
    const HF_TOKEN = "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";
    const MAX_SIZE = 10 * 1024 * 1024;

    // ========== FIREBASE INIT ==========
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ========== TIL TIZIMI ==========
    const translations = {
      uz: {
        title: "AI Rasm Kuchaytirgich",
        subtitle: "Rasmlarni 8K gacha kuchaytirish uchun kiring",
        signIn: "Google orqali kirish",
        signOut: "Chiqish",
        profile: "Profil",
        settings: "Sozlamalar",
        dropHere: "Rasmni shu yerga tashlang",
        browse: "yoki bosing",
        upscaling: "Kuchaytirilmoqda...",
        original: "Asl rasm",
        upscaled: "Kuchaytirilgan",
        download: "⬇ Yuklab olish",
        save: "Saqlash",
        close: "Yopish",
        language: "Til",
        errorFile: "Faqat rasm fayli (JPG, PNG) yuklang",
        errorSize: "Rasm hajmi 10MB dan oshmasin",
        errorFetch: "Xatolik yuz berdi. Qayta urinib ko‘ring.",
      },
      ru: {
        title: "AI Улучшатель изображений",
        subtitle: "Войдите, чтобы улучшить изображения до 8K",
        signIn: "Войти через Google",
        signOut: "Выйти",
        profile: "Профиль",
        settings: "Настройки",
        dropHere: "Перетащите изображение сюда",
        browse: "или нажмите",
        upscaling: "Улучшение...",
        original: "Оригинал",
        upscaled: "Улучшенное",
        download: "⬇ Скачать",
        save: "Сохранить",
        close: "Закрыть",
        language: "Язык",
        errorFile: "Пожалуйста, выберите изображение (JPG, PNG)",
        errorSize: "Размер файла не более 10МБ",
        errorFetch: "Произошла ошибка. Попробуйте ещё раз.",
      },
      en: {
        title: "AI Image Upscaler",
        subtitle: "Sign in to upscale images up to 8K",
        signIn: "Sign in with Google",
        signOut: "Sign Out",
        profile: "Profile",
        settings: "Settings",
        dropHere: "Drop your image here",
        browse: "or tap to browse",
        upscaling: "Upscaling...",
        original: "Original",
        upscaled: "Upscaled",
        download: "⬇ Download",
        save: "Save",
        close: "Close",
        language: "Language",
        errorFile: "Please select an image file (JPG, PNG)",
        errorSize: "File size must be under 10MB",
        errorFetch: "An error occurred. Please try again.",
      }
    };

    let currentLang = localStorage.getItem('lang') || 'uz';
    function t(key) { return translations[currentLang]?.[key] || key; }
    function applyLanguage() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (el.tagName === 'INPUT' || el.tagName === 'SELECT') return;
        el.textContent = t(key);
      });
      document.getElementById('langSelect').value = currentLang;
    }

    // ========== DOM ELEMENTLAR ==========
    const authScreen = document.getElementById('authScreen');
    const dashboard = document.getElementById('dashboard');
    const googleSignInBtn = document.getElementById('googleSignInBtn');
    const signOutBtn = document.getElementById('signOutBtn');
    const profileBtn = document.getElementById('profileBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const userNameP = document.getElementById('userName');
    const userAvatar = document.getElementById('userAvatar');
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const scaleBtns = document.querySelectorAll('.scale-btn');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const progressPercent = document.getElementById('progressPercent');
    const resultBox = document.getElementById('resultBox');
    const originalImg = document.getElementById('originalImg');
    const upscaledImg = document.getElementById('upscaledImg');
    const downloadBtn = document.getElementById('downloadBtn');
    const errorMsg = document.getElementById('errorMsg');

    const profileModal = document.getElementById('profileModal');
    const closeProfileBtn = document.getElementById('closeProfileBtn');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const displayNameInput = document.getElementById('displayNameInput');
    const profileAvatar = document.getElementById('profileAvatar');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const langSelect = document.getElementById('langSelect');

    let selectedScale = 4;

    // ========== SCALE TANLASH ==========
    scaleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        scaleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedScale = parseInt(btn.dataset.scale);
      });
    });
    document.querySelector('.scale-btn[data-scale="4"]').classList.add('active');

    // ========== AUTH ==========
    googleSignInBtn.addEventListener('click', () => {
      auth.signInWithPopup(provider).catch(err => {
        if (err.code === 'auth/popup-blocked') {
          auth.signInWithRedirect(provider);
        } else {
          showError('Kirish xatosi: ' + err.message);
        }
      });
    });

    signOutBtn.addEventListener('click', () => auth.signOut());

    auth.onAuthStateChanged(user => {
      if (user) {
        authScreen.classList.add('hidden');
        dashboard.classList.remove('hidden');
        const displayName = localStorage.getItem('displayName') || user.displayName || 'User';
        userNameP.textContent = '👋 ' + displayName;
        userAvatar.src = user.photoURL || 'https://via.placeholder.com/40';
        profileAvatar.src = user.photoURL || 'https://via.placeholder.com/80';
        displayNameInput.value = displayName;
      } else {
        authScreen.classList.remove('hidden');
        dashboard.classList.add('hidden');
      }
    });

    // ========== PROFILE MODAL ==========
    profileBtn.addEventListener('click', () => profileModal.classList.remove('hidden'));
    closeProfileBtn.addEventListener('click', () => profileModal.classList.add('hidden'));
    saveProfileBtn.addEventListener('click', () => {
      const newName = displayNameInput.value.trim();
      if (newName) {
        localStorage.setItem('displayName', newName);
        userNameP.textContent = '👋 ' + newName;
        profileModal.classList.add('hidden');
      }
    });

    // ========== SETTINGS MODAL ==========
    settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
    closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
    langSelect.addEventListener('change', () => {
      currentLang = langSelect.value;
      localStorage.setItem('lang', currentLang);
      applyLanguage();
      settingsModal.classList.add('hidden');
    });

    // ========== DRAG & DROP ==========
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });
    uploadZone.addEventListener('dragover', e => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    // ========== ASOSIY UPSCALE FUNKSIYASI ==========
    async function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showError(t('errorFile'));
        return;
      }
      if (file.size > MAX_SIZE) {
        showError(t('errorSize'));
        return;
      }
      hideError();
      resultBox.classList.add('hidden');
      const reader = new FileReader();
      reader.onload = e => originalImg.src = e.target.result;
      reader.readAsDataURL(file);

      progressContainer.classList.remove('hidden');
      progressFill.style.width = '0%';
      progressPercent.textContent = '0%';
      progressText.textContent = t('upscaling');

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 90) progress = 90;
        progressFill.style.width = progress + '%';
        progressPercent.textContent = Math.floor(progress) + '%';
      }, 300);

      const models = {
        2: 'nateraw/real-esrgan-x2',
        4: 'nateraw/real-esrgan-x4',
        8: 'nateraw/real-esrgan-x8'
      };
      const model = models[selectedScale] || models[4];

      try {
        const response = await fetch(`https://api-inference.huggingface.co/models/${model}`, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + HF_TOKEN },
          body: file
        });

        clearInterval(interval);
        if (!response.ok) {
          if (response.status === 503) throw new Error('Model band, biroz kuting.');
          throw new Error('Server xatosi: ' + response.status);
        }

        progressFill.style.width = '100%';
        progressPercent.textContent = '100%';
        await new Promise(r => setTimeout(r, 500));

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        upscaledImg.src = url;
        resultBox.classList.remove('hidden');

        downloadBtn.onclick = () => {
          const a = document.createElement('a');
          a.href = url;
          a.download = `upscaled_${selectedScale}x_` + file.name;
          a.click();
        };
      } catch (err) {
        showError(t('errorFetch') + ' ' + err.message);
      } finally {
        clearInterval(interval);
        progressContainer.classList.add('hidden');
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }
    function hideError() {
      errorMsg.classList.add('hidden');
    }

    applyLanguage();
  </script>
</body>
</html>
