<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>tygozZz - AI Image Upscaler</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- Tailwind CSS (UI uchun) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05050c; }
        
        /* Shisha effekti (Glassmorphism) */
        .glass-card {
            background: rgba(16, 16, 30, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        }
        
        /* Yuklash maydoni */
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.01);
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.04);
            transform: scale(1.005);
        }

        /* Slider va rasm */
        .comparison-container { position: relative; overflow: hidden; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .img-before, .img-after { width: 100%; height: 100%; object-fit: contain; display: block; max-height: 650px; background: #05050c; }
        .comparison-overlay {
            position: absolute; top: 0; left: 0; width: 50%; height: 100%;
            overflow: hidden; border-right: 3px solid #3b82f6;
            box-shadow: 2px 0 25px rgba(59, 130, 246, 0.15);
        }
        .slider-handle {
            position: absolute; top: 0; left: 50%; width: 4px; height: 100%;
            background: #3b82f6; transform: translateX(-50%); cursor: ew-resize; z-index: 10;
        }
        .slider-handle::after {
            content: "↔"; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #0b0b1a; color: #fff;
            padding: 10px; border-radius: 50%; font-size: 14px; border: 2px solid #3b82f6;
        }

        /* Modal oynalar */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content { max-width: 400px; width: 90%; border-radius: 24px; padding: 24px; }

        /* Loader */
        .loader { display: none; }
        .loader.active { display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 20px 0; }
        .spinner { width: 45px; height: 45px; border: 4px solid #1a1a2e; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        input[type="file"] { display: none; }
        select { background: #18182e; color: #fff; border: 1px solid #2a2a4e; padding: 8px 12px; border-radius: 10px; outline: none; width: 100%; }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-4">

    <!-- SOZLAMALAR (Til va Profil) -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content glass-card">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold" id="settingsTitle">Sozlamalar</h3>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1" id="langLabel">Til / Language</label>
                    <select id="langSelect" onchange="changeLanguage(this.value)">
                        <option value="uz">O'zbekcha</option>
                        <option value="ru">Русский</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1" id="profileLabel">Profil ismi</label>
                    <input type="text" id="profileNameInput" class="w-full bg-[#18182e] border border-[#2a2a4e] rounded-xl px-4 py-2 outline-none focus:border-blue-500 transition" placeholder="Ismingiz">
                </div>
                <button onclick="saveProfile()" class="w-full bg-blue-600 hover:bg-blue-500 font-semibold py-2.5 rounded-xl transition shadow-lg shadow-blue-900/30">Saqlash</button>
            </div>
        </div>
    </div>

    <!-- ASOSIY KONTEYNER -->
    <div class="w-full max-w-6xl glass-card rounded-3xl p-6 md:p-8">
        
        <!-- HEADER (Endi stiker va kamera yo'q) -->
        <header class="flex flex-col md:flex-row items-center justify-between gap-4 pb-6 border-b border-white/5 mb-6">
            <div class="flex items-center gap-3">
                <!-- FAQAT LOGOTIP (Sizning GitHub rasmingiz) -->
                <img src="https://raw.githubusercontent.com/tygocmbk07-dotcom/Logo/main/InShot_20260630_050644049.png" alt="tygozZz Logo" class="w-10 h-10 object-contain rounded-lg shadow-lg shadow-blue-500/20">
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-purple-400 text-transparent bg-clip-text">tygozZz</h1>
            </div>
            
            <div class="flex items-center gap-3" id="authSection">
                <!-- Google Login -->
                <button id="loginBtn" class="flex items-center gap-2 bg-white text-slate-900 px-5 py-2.5 rounded-full font-semibold shadow-lg hover:scale-105 transition duration-200">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span id="loginText">Google bilan kirish</span>
                </button>

                <!-- User Profile -->
                <div id="userProfile" class="hidden items-center gap-2 bg-white/5 border border-white/10 rounded-full pl-1 pr-4 py-1">
                    <img id="userAvatar" src="" alt="Avatar" class="w-8 h-8 rounded-full border border-blue-500/50">
                    <span id="userDisplayName" class="text-sm font-medium">TyGo Cmbk</span>
                    <button onclick="openSettings()" class="text-gray-400 hover:text-white text-sm ml-1">⚙️</button>
                    <button id="logoutBtn" class="text-red-400 hover:text-red-300 text-sm ml-1">Chiqish</button>
                </div>
            </div>
        </header>

        <!-- DROP ZONE (Endi o'rtadagi katta pikselli stiker yo'q, faqat matn) -->
        <div id="dropZone" class="drop-zone rounded-2xl p-16 text-center cursor-pointer transition relative">
            <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
            
            <div id="uploadUI" class="flex flex-col items-center gap-3">
                <h2 class="text-2xl font-semibold" id="uploadTitle">Rasmni bu yerga tashlang</h2>
                <p class="text-gray-400 text-sm" id="uploadSub">Drag & drop yoki bosing</p>
                <button id="browseBtn" class="mt-2 bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-full font-semibold transition shadow-lg shadow-blue-900/30" id="uploadBtn">Rasm tanlash</button>
                
                <!-- Login Warning -->
                <div id="loginWarning" class="hidden mt-3 text-red-400 text-sm bg-red-900/20 px-4 py-2 rounded-lg border border-red-900/30">
                    ⚠️ Iltimos, avval Google orqali kiring!
                </div>
            </div>
        </div>

        <!-- MODEL SELECTOR -->
        <div class="mt-6 flex items-center justify-center gap-3 flex-wrap">
            <span class="text-gray-400 text-sm font-medium" id="scaleLabel">Kuchaytirish</span>
            <button class="model-chip px-4 py-1.5 rounded-full border border-white/10 text-sm font-medium hover:bg-white/5 transition active" data-scale="2">2x</button>
            <button class="model-chip px-4 py-1.5 rounded-full border border-white/10 text-sm font-medium hover:bg-white/5 transition" data-scale="4">4x</button>
            <button class="model-chip px-4 py-1.5 rounded-full border border-white/10 text-sm font-medium hover:bg-white/5 transition" data-scale="8">8x</button>
        </div>

        <!-- LOADING -->
        <div class="loader mt-8" id="loadingIndicator">
            <div class="spinner"></div>
            <p class="text-gray-300 font-medium" id="loadingText">AI rasmni kuchaytirmoqda...</p>
            <p class="text-gray-500 text-sm" id="loadingSub">Bu 10-40 soniya vaqt olishi mumkin</p>
        </div>

        <!-- RESULT (Slider) -->
        <div id="resultContainer" class="hidden mt-8 max-w-3xl mx-auto">
            <div class="comparison-container relative">
                <img id="originalImg" class="img-before" alt="Original">
                <div class="comparison-overlay" id="overlay">
                    <img id="upscaledImg" class="img-after" alt="Upscaled">
                </div>
                <div class="slider-handle" id="slider"></div>
            </div>
            
            <!-- TUGMALAR -->
            <div class="flex flex-wrap justify-center gap-3 mt-4">
                <button id="zoomInBtn" class="bg-white/5 border border-white/10 px-5 py-2 rounded-full text-sm hover:bg-white/10 transition">🔍 + Zoom</button>
                <button id="zoomOutBtn" class="bg-white/5 border border-white/10 px-5 py-2 rounded-full text-sm hover:bg-white/10 transition">🔍 - Zoom</button>
                <button id="shareBtn" class="bg-white/5 border border-white/10 px-5 py-2 rounded-full text-sm hover:bg-white/10 transition text-blue-400">📤 Share</button>
                <button id="downloadBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-full text-sm font-semibold shadow-lg shadow-emerald-900/30">⬇ Yuklab olish</button>
            </div>
        </div>

    </div>

<script>
    // --- FIREBASE ---
    const firebaseConfig = { apiKey: "AIzaSyCrAq_ASEVnaEfAeOdJ2xjP_ib0XXblWoQ", authDomain: "tygozzz-8f657.firebaseapp.com", projectId: "tygozzz-8f657", storageBucket: "tygozzz-8f657.firebasestorage.app", messagingSenderId: "717999040883", appId: "1:717999040883:web:eb0484c74f2b50f55afd06" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const storage = firebase.storage();

    // --- HUGGING FACE ---
    const HF_TOKEN = "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";
    const MODELS = { 2: 'nateraw/real-esrgan-x2', 4: 'nateraw/real-esrgan-x4', 8: 'nateraw/real-esrgan-x8' };

    // --- DOM ELEMENTS ---
    const loginBtn = document.getElementById('loginBtn'); const logoutBtn = document.getElementById('logoutBtn');
    const userProfile = document.getElementById('userProfile'); const userAvatar = document.getElementById('userAvatar');
    const userDisplayName = document.getElementById('userDisplayName'); const loginWarning = document.getElementById('loginWarning');
    const dropZone = document.getElementById('dropZone'); const fileInput = document.getElementById('fileInput');
    const browseBtn = document.getElementById('browseBtn'); const modelChips = document.querySelectorAll('.model-chip');
    const loadingIndicator = document.getElementById('loadingIndicator'); const resultContainer = document.getElementById('resultContainer');
    const originalImg = document.getElementById('originalImg'); const upscaledImg = document.getElementById('upscaledImg');
    const overlay = document.getElementById('overlay'); const slider = document.getElementById('slider');
    const downloadBtn = document.getElementById('downloadBtn'); const shareBtn = document.getElementById('shareBtn');
    const zoomInBtn = document.getElementById('zoomInBtn'); const zoomOutBtn = document.getElementById('zoomOutBtn');
    const settingsModal = document.getElementById('settingsModal');

    let currentScale = 2; let currentUser = null; let currentResultUrl = null; let zoomLevel = 1;

    // --- TIL ---
    const translations = {
        uz: { login: "Google bilan kirish", logout: "Chiqish", upload: "Rasmni bu yerga tashlang", sub: "Drag & drop yoki bosing", browse: "Rasm tanlash", warning: "Iltimos, avval Google orqali kiring!", scale: "Kuchaytirish", loading: "AI rasmni kuchaytirmoqda...", sub_load: "Bu 10-40 soniya vaqt olishi mumkin", download: "Yuklab olish", share: "Ulushish", settings: "Sozlamalar", lang: "Til", profile: "Ism" },
        ru: { login: "Войти через Google", logout: "Выход", upload: "Перетащите изображение сюда", sub: "Перетащите или нажмите", browse: "Выбрать фото", warning: "Пожалуйста, войдите через Google!", scale: "Увеличение", loading: "ИИ увеличивает изображение...", sub_load: "Это может занять 10-40 секунд", download: "Скачать", share: "Поделиться", settings: "Настройки", lang: "Язык", profile: "Имя" },
        en: { login: "Sign in with Google", logout: "Sign Out", upload: "Drop image here", sub: "Drag & drop or tap", browse: "Browse files", warning: "Please sign in with Google first!", scale: "Upscale", loading: "AI is upscaling...", sub_load: "This may take 10-40 seconds", download: "Download", share: "Share", settings: "Settings", lang: "Language", profile: "Name" }
    };
    let currentLang = 'uz';
    function updateTexts(lang) {
        const t = translations[lang];
        document.getElementById('loginText').innerText = t.login; document.getElementById('logoutBtn').innerText = t.logout;
        document.getElementById('uploadTitle').innerText = t.upload; document.getElementById('uploadSub').innerText = t.sub;
        document.getElementById('browseBtn').innerText = t.browse; document.getElementById('loginWarning').innerHTML = `⚠️ ${t.warning}`;
        document.getElementById('scaleLabel').innerText = t.scale; document.getElementById('loadingText').innerText = t.loading;
        document.getElementById('loadingSub').innerText = t.sub_load; document.getElementById('downloadBtn').innerText = t.download;
        document.getElementById('shareBtn').innerText = t.share; document.getElementById('settingsTitle').innerText = t.settings;
        document.getElementById('langLabel').innerText = t.lang; document.getElementById('profileLabel').innerText = t.profile;
        document.getElementById('langSelect').value = lang;
    }

    // --- SETTINGS ---
    function openSettings() { settingsModal.classList.add('active'); document.getElementById('profileNameInput').value = userDisplayName.innerText; }
    function closeSettings() { settingsModal.classList.remove('active'); }
    function changeLanguage(val) { currentLang = val; updateTexts(val); }
    function saveProfile() { const name = document.getElementById('profileNameInput').value; if(name) userDisplayName.innerText = name; closeSettings(); }
    
    // --- AUTH ---
    loginBtn.addEventListener('click', () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()));
    logoutBtn.addEventListener('click', () => auth.signOut());
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user; loginBtn.classList.add('hidden'); userProfile.classList.remove('hidden');
            userAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff';
            userDisplayName.innerText = user.displayName || 'Foydalanuvchi';
            loginWarning.classList.add('hidden'); dropZone.classList.remove('opacity-50', 'cursor-not-allowed');
        } else {
            currentUser = null; loginBtn.classList.remove('hidden'); userProfile.classList.add('hidden');
            loginWarning.classList.remove('hidden'); dropZone.classList.add('opacity-50', 'cursor-not-allowed');
            resultContainer.classList.add('hidden');
        }
    });

    // --- UPLOAD ---
    browseBtn.addEventListener('click', (e) => { e.stopPropagation(); if(!currentUser) return; fileInput.click(); });
    dropZone.addEventListener('click', () => { if(currentUser) fileInput.click(); });
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if(currentUser && e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', (e) => { if(e.target.files.length) handleFile(e.target.files[0]); });

    // --- AI PROCESS (Xatolik to'liq tuzatildi) ---
    async function handleFile(file) {
        if(!currentUser) return;
        resultContainer.classList.add('hidden'); loadingIndicator.classList.add('active');
        const reader = new FileReader();
        reader.onload = (e) => { originalImg.src = e.target.result; };
        reader.readAsDataURL(file);

        try {
            const storageRef = storage.ref('uploads/' + Date.now() + '_' + file.name);
            await storageRef.put(file);
            const downloadUrl = await storageRef.getDownloadURL();
            const imageRes = await fetch(downloadUrl);
            const imageBlob = await imageRes.blob();

            // HF API ga TO'G'RIDAN-TO'G'RI BLOB (binary) yuboriladi
            const modelName = MODELS[currentScale];
            const hfResponse = await fetch(`https://api-inference.huggingface.co/models/${modelName}`, {
                headers: { 'Authorization': `Bearer ${HF_TOKEN}` },
                method: 'POST',
                body: imageBlob 
            });
            if (!hfResponse.ok) throw new Error('HF API xatosi. Qayta urinib ko\'ring.');
            
            const resultBlob = await hfResponse.blob();
            currentResultUrl = URL.createObjectURL(resultBlob);
            upscaledImg.src = currentResultUrl;
            overlay.style.width = '50%'; slider.style.left = '50%';
            loadingIndicator.classList.remove('active'); resultContainer.classList.remove('hidden');
        } catch (error) {
            loadingIndicator.classList.remove('active');
            alert('Xatolik: ' + error.message + '\nIltimos, qayta urinib ko\'ring.');
        }
    }

    // --- MODELS ---
    modelChips.forEach(btn => {
        btn.addEventListener('click', () => {
            modelChips.forEach(b => { b.classList.remove('active', 'border-blue-500', 'bg-blue-500/10', 'text-blue-400'); b.classList.add('border-white/10'); });
            btn.classList.add('active', 'border-blue-500', 'bg-blue-500/10', 'text-blue-400');
            currentScale = parseInt(btn.dataset.scale);
        });
    });

    // --- SLIDER ---
    let isDragging = false;
    function sliderMove(x) {
        if (!isDragging || !resultContainer.classList.contains('h
